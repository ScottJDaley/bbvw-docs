<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
  <title>Pokemon Blaze Black & Volt White Documentation</title>
  <link rel="icon" href="img/items/timer-ball.png">
  <meta name="description" content="Comprehensive guide for the BBVW romhack.">

  <!-- Default Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-simple-dark-mode@latest/dist/style.min.css" />
  
  <style>
    :root {
      --docsifytabs-border-color: #ededed;
      --docsifytabs-tab-background: #f8f8f8;
    }
    
    .markdown-section {
      max-width: 900px;
    }
    
    /* Type Badges */
    .type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      color: white;
      font-weight: bold;
      text-transform: capitalize;
      margin-right: 5px;
      font-size: 0.9em;
      border: 1px solid rgba(0,0,0,0.1);
    }
    .type-normal { background: #A8A878; }
    .type-fire { background: #F08030; }
    .type-water { background: #6890F0; }
    .type-grass { background: #78C850; }
    .type-electric { background: #F8D030; }
    .type-ice { background: #98D8D8; }
    .type-fighting { background: #C03028; }
    .type-poison { background: #A040A0; }
    .type-ground { background: #E0C068; }
    .type-flying { background: #A890F0; }
    .type-psychic { background: #F85888; }
    .type-bug { background: #A8B820; }
    .type-rock { background: #B8A038; }
    .type-ghost { background: #705898; }
    .type-dragon { background: #7038F8; }
    .type-dark { background: #705848; }
    .type-steel { background: #B8B8D0; }
    .type-fairy { background: #EE99AC; }

    /* Stat Table */
    .stat-table { width: 100%; border-collapse: collapse; }
    .stat-row { height: 30px; }
    .stat-bar-bg { background: #eee; width: 300px; height: 15px; border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
    .stat-bar-fill { height: 100%; background: linear-gradient(to right, #ff7f0e, #4caf50); }
    
    .change-new { color: #2e7d32; font-weight: bold; }
    .change-old { color: #c62828; text-decoration: line-through; font-size: 0.9em; margin-left: 5px; }
    .change-delta { font-size: 0.8em; color: #666; margin-left: 5px; }
    .change-new-label { background: #4caf50; color: white; padding: 1px 4px; border-radius: 3px; font-size: 0.7em; font-weight: bold; }
    .change-old-label { background: #c62828; color: white; padding: 1px 4px; border-radius: 3px; font-size: 0.7em; font-weight: bold; }
    .change-move-shifted { background: #1976d2; color: white; padding: 1px 4px; border-radius: 3px; font-size: 0.7em; font-weight: bold; }
    .change-old-lv { color: #c62828; text-decoration: line-through; font-size: 0.8em; }

    /* Fix dark mode styles for Docsify Simple Dark Mode */
    body.dark {
      background-color: #1a1a1a;
      color: #ddd;
    }
    body.dark .stat-bar-bg { background: #444; border-color: #555; }
    body.dark .change-new { color: #81c784; }
    body.dark .change-old { color: #e57373; }
    
    /* Improve category icon display */
    img[alt="physical"], img[alt="special"], img[alt="status"] { object-fit: contain; height: 20px; vertical-align: middle; }
  </style>

</head>

<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'BBVW Documentation',
      repo: 'https://github.com/scottdaley/bbvw-docs',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results!',
        depth: 6
      }
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-simple-dark-mode@latest/dist/index.min.js"></script>
</body>
</html>
